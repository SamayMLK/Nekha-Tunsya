<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Recettes du monde</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

/* HEADER */
.header{
    background:#c8102e;
    color:white;
    padding:25px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 280px));
    justify-content: center;
    gap:20px;
    padding:30px;
}

/* CARD */
.card{
    width:260px;
    margin:auto;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h3{
    margin:10px 0;
    color:#333;
}

.card-content a{
    text-decoration:none;
    color:#c8102e;
    font-weight:bold;
}

/* FOOTER */
.footer{
    margin-top:40px;
    padding:20px;
    background:#111;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <h1>🌍 Recettes du monde</h1>
    <p>Des recettes testées et approuvées 💖</p>
</div>

<div class="container">

    <!-- CARTE 1 -->
    <div class="card">
        <img src="images/pain-lait.png" alt="Pains au lait">
        <div class="card-content">
            <h3>🥐 Pains au lait aux pépites de chocolat</h3>
            <a href="pain-lait.html">Voir la recette</a>
        </div>
    </div>

    <!-- TU POURRAS AJOUTER D'AUTRES RECETTES ICI -->

</div>

<div style="margin:30px;">
    <a href="index.html">⬅ Retour à l’accueil</a>
</div>

<div class="footer">
    © 2026 - SamayMLK
</div>

</body>
</html>
